[project]
name = "bigscity-libcity"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    "aiohttp",
    "einops>=0.8.2",
    "fastdtw>=0.3.4",
    "flake8>=3.3.0",
    "gensim>=4.0.1",
    "geopy>=2.0.0",
    "hyperopt>=0.2.5",
    "idna>=2.10",
    "infomap>=2.8.1",
    "networkx>=2.5.1",
    "nltk>=3.2.4",
    "numpy>=1.19.4,<2",
    "pandas>=1.1.5",
    "pytest>=3.2.1",
    "ray[tune]>=1.2.0",
    "scikit-learn>=0.24.0",
    "scipy>=1.5.3",
    "statsmodels>=0.11.0",
    "tabulate>=0.8.9",
    "tensorboard>=2.4.1",
    "torchdiffeq>=0.2.3",
    "tqdm>=4.60.0",
    "torch==2.10.0",
    "torchaudio==2.10.0",
    "torchvision==0.25.0",
    "torchdata>=0.7.1",
    "torch-geometric>=2.5,<2.7",
    "pywavelets>=1.9.0",
    "setuptools>=82.0.0",
    "tslearn",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchaudio = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true