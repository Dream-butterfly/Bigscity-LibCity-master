[project]
name = "GNN-TFP"
version = "0.2.0"
description = "Graph Neural Network-based Traffic Flow Prediction"
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    "aiohttp",
    "dtaidistance>=2.3.13",
    "einops>=0.8.2",
    "gensim>=4.0.1",
    "geopy>=2.0.0",
    "infomap>=2.8.1",
    "networkx>=2.5.1",
    "numpy>=2.0.0",
    "optuna>=4.0.0",
    "pandas>=1.1.5",
    "pytest>=3.2.1",
    "ruff>=0.12.0",
    "scikit-learn>=0.24.0",
    "scipy>=1.5.3",
    "statsmodels>=0.11.0",
    "tabulate>=0.8.9",
    "tensorboard>=2.4.1",
    "torchdiffeq>=0.2.3",
    "tqdm>=4.60.0",
    "torch==2.10.0",
    "torchaudio==2.10.0",
    "torchvision==0.25.0",
    "torch-geometric>=2.5,<2.7",
    "pywavelets>=1.9.0",
    "tslearn",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchaudio = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
