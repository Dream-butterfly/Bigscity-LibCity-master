<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title id="doc_title" data-i18n="app_title">模型训练网页版</title>
    <script src="https://assets.pyecharts.org/assets/v5/echarts.min.js"></script>
    <link id="theme_stylesheet" rel="stylesheet" href="/static/train_web_flask.css"/>
</head>
<body>
<div class="wrap">
    <div class="page-head">
        <div>
            <h1 data-i18n="app_title">模型训练网页版</h1>
            <div class="sub" data-i18n="app_subtitle">模型自动检索 + 命令行参数可视化设置 + 全参数编辑 + 实时日志</div>
        </div>
        <div class="page-controls">
            <label for="lang_select" class="small" data-i18n="lang_label">语言</label>
            <select id="lang_select" class="control-select">
                <option value="zh-CN" data-i18n="lang_zh">中文</option>
                <option value="ja-JP" data-i18n="lang_jp">日本語</option>
                <option value="en-US" data-i18n="lang_en">English</option>
            </select>
            <label for="theme_select" class="small" data-i18n="theme_label">主题</label>
            <select id="theme_select" class="control-select">
                <option value="light" data-i18n="theme_light">亮色</option>
                <option value="dark" data-i18n="theme_dark">暗色</option>
            </select>
        </div>
    </div>

    <div class="tabs">
        <button id="tab_btn_train" class="tab-btn active" type="button" data-i18n="tab_train">训练</button>
        <button id="tab_btn_compare" class="tab-btn" type="button" data-i18n="tab_compare">模型对比</button>
    </div>

    <div id="tab_train" class="tab-panel active">
    <div class="card resizable-card">
        <div class="config-groups">
            <div class="config-group">
                <div class="config-group-title" data-i18n="group_basic_task">基础任务</div>
                <div class="group-grid">
                    <div><label data-param-label="task">task</label><select id="task"></select></div>
                    <div><label data-param-label="model">model</label><select id="model"></select></div>
                    <div><label data-param-label="dataset">dataset</label><select id="dataset"></select></div>
                    <div><label data-param-label="config_file">config_file</label><input id="config_file" data-i18n-placeholder="placeholder_optional_no_json" placeholder="可选，不带 .json"/></div>
                </div>
            </div>
            <div class="config-group">
                <div class="config-group-title" data-i18n="group_train_control">训练控制</div>
                <div class="group-grid">
                    <div><label data-param-label="max_epoch">max_epoch</label><input id="max_epoch" value="10"/></div>
                    <div><label data-param-label="batch_size">batch_size</label><input id="batch_size" placeholder="64"/></div>
                    <div><label data-param-label="learning_rate">learning_rate</label><input id="learning_rate" placeholder="0.001"/></div>
                    <div><label data-param-label="train_rate">train_rate</label><input id="train_rate" placeholder="0.7"/></div>
                    <div><label data-param-label="eval_rate">eval_rate</label><input id="eval_rate" placeholder="0.1"/></div>
                    <div>
                        <label data-param-label="saved_model">saved_model</label>
                        <select id="saved_model">
                            <option value="true" selected>true</option>
                            <option value="false">false</option>
                        </select>
                    </div>
                    <div>
                        <label data-param-label="train">train</label>
                        <select id="train">
                            <option value="true" selected>true</option>
                            <option value="false">false</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="config-group">
                <div class="config-group-title" data-i18n="group_runtime_env">运行环境</div>
                <div class="group-grid">
                    <div><label data-param-label="exp_id">exp_id</label><input id="exp_id" data-i18n-placeholder="placeholder_optional" placeholder="可选"/></div>
                    <div><label data-param-label="seed">seed</label><input id="seed" placeholder="0"/></div>
                    <div>
                        <label data-param-label="gpu">gpu</label>
                        <select id="gpu">
                            <option value=""></option>
                            <option value="true">true</option>
                            <option value="false">false</option>
                        </select>
                    </div>
                    <div><label data-param-label="gpu_id">gpu_id</label><input id="gpu_id" placeholder="0"/></div>
                </div>
            </div>
            <div class="config-group">
                <div class="config-group-title" data-i18n="group_override_args">覆盖参数</div>
                <div class="group-grid">
                    <div><label data-param-label="dataset_class">dataset_class</label><input id="dataset_class" placeholder="TrafficStatePointDataset"/></div>
                    <div><label data-param-label="executor">executor</label><input id="executor" placeholder="TrafficStateExecutor"/></div>
                    <div><label data-param-label="evaluator">evaluator</label><input id="evaluator" placeholder="TrafficStateEvaluator"/></div>
                    <div class="span-all"><label data-param-label="extra_args">extra_args</label><input id="extra_args" placeholder="--log_level INFO"/></div>
                </div>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-primary" onclick="startTrain()" data-i18n="btn_start_train">开始训练</button>
            <button class="btn btn-danger" onclick="stopTrain()" data-i18n="btn_stop_train">停止训练</button>
            <button class="btn btn-auto" onclick="clearState()" type="button" data-i18n="btn_clear_state">清空状态</button>
            <span id="status" class="badge status-idle" data-i18n="status_idle">idle</span>
        </div>
    </div>

    <div class="card resizable-card">
        <div class="toolbar">
            <strong data-i18n="panel_all_params_title">全部可选参数（默认值可编辑）</strong>
            <div class="toolbar-controls">
                <input id="param_filter" class="filter-input" data-i18n-placeholder="placeholder_filter_param" placeholder="筛选参数名..."/>
                <span class="small"><span data-i18n="label_total_items">共</span> <span id="param_count">0</span> <span data-i18n="label_items">项</span></span>
                <button class="btn btn-primary btn-auto" onclick="loadDefaults()" data-i18n="btn_load_defaults">加载默认全参数</button>
                <button class="btn btn-auto" onclick="resetParamTypes()" data-i18n="btn_reset_types">重置类型</button>
            </div>
        </div>
        <div class="param-split">
            <div>
                <div class="small section-caption"><span id="param_title_config">config</span>（<span id="param_count_config">0</span>）</div>
                <div class="table-wrap param-table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th id="th_config_name_localized">中文名</th>
                            <th id="th_config_name_raw">原参数名</th>
                            <th id="th_config_type" class="param-type">类型</th>
                            <th id="th_config_value">值</th>
                        </tr>
                        </thead>
                        <tbody id="param_tbody_config"></tbody>
                    </table>
                </div>
            </div>
            <div>
                <div class="small section-caption"><span id="param_title_executor">executor</span>（<span id="param_count_executor">0</span>）</div>
                <div class="table-wrap param-table-wrap">
                    <table>
                        <thead>
                        <tr>
                            <th id="th_executor_name_localized">中文名</th>
                            <th id="th_executor_name_raw">原参数名</th>
                            <th id="th_executor_type" class="param-type">类型</th>
                            <th id="th_executor_value">值</th>
                        </tr>
                        </thead>
                        <tbody id="param_tbody_executor"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="pane" id="pane_top">
        <div class="card resizable-card pane-left">
            <div class="toolbar">
                <strong data-i18n="log_title">训练日志</strong>
                <div class="toolbar-controls">
                    <span class="chip" data-i18n="realtime">实时</span>
                    <button id="log_autoscroll_btn" class="btn btn-auto log-btn" type="button">自动滚动: 开</button>
                </div>
            </div>
            <div class="log-shell">
                <div class="log-shell-top">
                    <div class="log-lights">
                        <span class="light red"></span>
                        <span class="light yellow"></span>
                        <span class="light green"></span>
                    </div>
                    <span class="log-title mono" data-i18n="log_file_name">train.log</span>
                </div>
                <div id="logs" class="log-stream mono"></div>
            </div>
        </div>
        <div class="pane-resizer" aria-label="resize"></div>
        <div class="card resizable-card pane-right">
            <div class="toolbar">
                <strong data-i18n="model_param_title">模型参数量示意图</strong>
                <div class="toolbar-controls">
                    <span class="chip" data-i18n="realtime">实时</span>
                    <select id="model_plot_type" class="btn btn-auto" style="width:auto">
                        <option value="pie" data-i18n="chart_type_pie">饼图</option>
                        <option value="bar" data-i18n="chart_type_bar">柱状图</option>
                    </select>
                    <label for="model_plot_topk_pie" class="small" data-i18n="label_pie_topk">Pie TopK</label>
                    <input id="model_plot_topk_pie" class="topk-input" type="number" min="1" max="100" value="8"/>
                    <label for="model_plot_topk_bar" class="small" data-i18n="label_bar_topk">Bar TopK</label>
                    <input id="model_plot_topk_bar" class="topk-input" type="number" min="1" max="100" value="12"/>
                </div>
            </div>
            <div id="model_param_summary" class="small mb-6"></div>
            <div id="model_param_chart"></div>
        </div>
    </div>

    <div class="card resizable-card">
        <div class="toolbar"><strong data-i18n="loss_title">训练 Loss 曲线</strong><span id="loss_summary" class="small"></span></div>
        <div id="loss_chart"></div>
    </div>

    <div class="pane" id="pane_bottom">
        <div class="card resizable-card pane-left">
            <div class="toolbar"><strong data-i18n="metrics_csv_title">评估指标（CSV）</strong><span id="summary" class="small"></span></div>
            <div class="table-wrap table-wrap-300">
                <div id="metrics"></div>
            </div>
        </div>
        <div class="pane-resizer" aria-label="resize"></div>

        <div class="card resizable-card pane-right">
            <strong data-i18n="prediction_demo_title">预测效果演示</strong>
            <div id="chart"></div>
        </div>
    </div>
    </div>

    <div id="tab_compare" class="tab-panel">
        <div class="card resizable-card">
            <div class="toolbar">
                <strong data-i18n="compare_panel_title">已训练模型效果对比（来自 outputs）</strong>
                <div class="toolbar-controls">
                    <button class="btn btn-auto" type="button" onclick="loadCompareRuns()" data-i18n="btn_refresh_runs">刷新模型列表</button>
                    <button class="btn btn-primary btn-auto" type="button" onclick="loadComparison()" data-i18n="btn_start_compare">开始对比</button>
                </div>
            </div>
            <div class="group-grid">
                <div>
                    <label data-i18n="compare_model_a">模型A</label>
                    <select id="compare_run_a"></select>
                </div>
                <div>
                    <label data-i18n="compare_model_b">模型B</label>
                    <select id="compare_run_b"></select>
                </div>
                <div>
                    <label data-i18n="compare_model_c_optional">模型C（可选）</label>
                    <select id="compare_run_c"></select>
                </div>
            </div>
        </div>
        <div class="pane">
            <div class="card resizable-card pane-left">
                <div class="toolbar"><strong data-i18n="compare_metrics_title">指标对比</strong></div>
                <div class="table-wrap table-wrap-300">
                    <table id="compare_metrics"></table>
                </div>
            </div>
            <div class="pane-resizer" aria-label="resize"></div>
            <div class="card resizable-card pane-right">
                <div class="toolbar"><strong data-i18n="compare_prediction_title">预测曲线对比</strong></div>
                <div id="compare_chart"></div>
            </div>
        </div>
    </div>
</div>
<script src="/static/main.js"></script>
</body>
</html>
